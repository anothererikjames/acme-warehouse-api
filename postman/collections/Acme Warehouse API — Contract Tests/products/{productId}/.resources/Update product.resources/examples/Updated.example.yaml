$kind: http-example
request:
  url: "{{baseUrl}}/products/:productId"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    productId: ""
  body:
    type: json
    content: "{}"
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
