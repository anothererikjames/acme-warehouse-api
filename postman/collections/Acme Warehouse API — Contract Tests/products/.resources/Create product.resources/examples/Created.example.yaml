$kind: http-example
request:
  url: "{{baseUrl}}/products"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: "{}"
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: ""
order: 1000
