$kind: http-example
request:
  url: "{{baseUrl}}/products?category=<string>&active=<boolean>"
  method: GET
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    category: <string>
    active: <boolean>
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
