$kind: http-request
name: POST /products
url: "{{baseUrl}}/products"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: '{"sku": "TEST-SKU-001", "name": "Test Pallet Rack", "category":
    "Storage", "weight": 42.5}'
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 201', () => pm.response.to.have.status(201));

      pm.test('Product has id', () =>
      pm.expect(pm.response.json()).to.have.property('id'));

      pm.test('SKU matches', () =>
      pm.expect(pm.response.json().sku).to.eql('TEST-SKU-001'));

      pm.collectionVariables.set('productId', pm.response.json().id);
    language: text/javascript
order: 2000
