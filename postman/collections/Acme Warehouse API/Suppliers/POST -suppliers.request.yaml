$kind: http-request
name: POST /suppliers
url: "{{baseUrl}}/suppliers"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: '{"name": "Test Supplier Co.", "contactEmail": "supplier@test.com",
    "leadTimeDays": 7}'
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 201', () => pm.response.to.have.status(201));

      pm.test('Supplier has id', () =>
      pm.expect(pm.response.json()).to.have.property('id'));

      pm.test('Contact email matches', () =>
      pm.expect(pm.response.json().contactEmail).to.eql('supplier@test.com'));

      pm.collectionVariables.set('supplierId', pm.response.json().id);
    language: text/javascript
order: 2000
