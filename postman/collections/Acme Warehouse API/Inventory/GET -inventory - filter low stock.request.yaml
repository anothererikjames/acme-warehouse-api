$kind: http-request
name: GET /inventory - filter low stock
url: "{{baseUrl}}/inventory?lowStock=true"
method: GET
headers:
  Authorization: Bearer {{token}}
queryParams:
  lowStock: "true"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('All items are low stock', () => {
        const json = pm.response.json();
        json.data.forEach(item => {
          pm.expect(item.availableQuantity).to.be.at.most(item.reorderPoint);
        });
      });
    language: text/javascript
order: 2000
