$kind: http-request
name: POST /inventory/:id/adjust
url: "{{baseUrl}}/inventory/{{inventoryItemId}}/adjust"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: '{"quantity": 10, "reason": "cycle_count", "notes": "Automated test
    adjustment"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Quantity changed', () => {
        pm.expect(pm.response.json()).to.have.property('quantity');
      });
    language: text/javascript
order: 5000
